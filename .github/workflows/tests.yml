name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  # ── Unit tests on macOS ARM (GitHub Actions M-series runners) ──────────
  unit-tests:
    name: Unit Tests (macOS ARM / Python ${{ matrix.python-version }})
    runs-on: macos-latest  # As of 2024, macos-latest = ARM (M1) on GitHub
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Apple Silicon
        run: |
          arch=$(uname -m)
          echo "Architecture: $arch"
          if [[ "$arch" != "arm64" ]]; then
            echo "WARNING: Not running on Apple Silicon (got $arch). MLX may not work."
          fi
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          python -c "import mlx.core as mx; print(f'MLX: {mx.__version__}')"
          python -c "import mlx_lm; print(f'mlx-lm: {mlx_lm.__version__}')"
      
      - name: Lint (ruff)
        run: ruff check mlx_engine_flash/ tests/ examples/ benchmarks/
      
      - name: Type check (mypy)
        run: mypy mlx_engine_flash/ --ignore-missing-imports --no-strict-optional
        continue-on-error: false  # Type errors are real bugs
      
      - name: Run core invariant tests (most important)
        run: |
          pytest tests/test_core_invariant.py -v --tb=long \
            -k "not real_model"  # skip tests requiring downloaded models
      
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_core_invariant.py \
            -k "not integration and not real_model and not nemotron" \
            --cov=mlx_engine_flash \
            --cov-report=term-missing \
            --cov-fail-under=60  # Fail if coverage drops below 60%
      
      - name: Verify import works
        run: |
          python -c "
          from mlx_engine_flash import FlashConfig, FlashManager
          from mlx_engine_flash.generation import FlashLLM, FlashGenerationLoop
          from mlx_engine_flash.integration.lmstudio import apply_flash_patch
          from mlx_engine_flash.integration.modelfile import parse_flash_directives
          print('All imports successful')
          "
      
      - name: Verify apply_flash_patch is a no-op when disabled
        run: |
          python -c "
          import mlx_lm
          orig_load = mlx_lm.load
          from mlx_engine_flash import FlashConfig
          from mlx_engine_flash.integration.lmstudio import apply_flash_patch, remove_flash_patch
          apply_flash_patch(FlashConfig(enabled=False))
          assert mlx_lm.load is orig_load, 'Patch applied when disabled!'
          print('No-op check passed')
          "

  # ── Integration tests (only on self-hosted M4 runner with models) ──────
  integration-tests:
    name: Integration Tests (self-hosted M4)
    runs-on: [self-hosted, macos, arm64]  # Requires self-hosted runner
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: unit-tests  # Only run if unit tests pass
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: pip install -e ".[dev]"
      
      - name: Download test model (cached)
        run: |
          python scripts/download_test_model.sh ./test_models/Qwen2.5-3B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      
      - name: Integration test with Qwen2.5-3B
        run: |
          pytest tests/test_integration.py -v --tb=long \
            --model ./test_models/Qwen2.5-3B --flash
      
      - name: Memory budget test with Qwen2.5-3B
        run: |
          pytest tests/test_flash_ram_budget.py -v --tb=long \
            -k "qwen or synthetic"
      
      - name: Benchmark (no regression check yet, just collect numbers)
        run: |
          python benchmarks/bench_flash.py \
            --model ./test_models/Qwen2.5-3B \
            --mode both --tokens 50 \
            | tee benchmarks/results/$(date +%Y%m%d).txt
